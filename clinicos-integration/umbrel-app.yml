manifestVersion: 1
id: clinicos-integration
category: automation
name: ClinicOS DICOM Integration
version: "1.0.3"
tagline: Bridge medical practice with ClinicOS
icon: https://assets.clinicos.de/images/clinicos-icon.svg
description: >-
  ClinicOS bridges your medical practice with ClinicOS. It receives DICOM images from
  modalities, extracts embedded PDFs and images, and securely uploads them
  to your ClinicOS cloud workspace.

  Features:
  - DICOM Listener (C-STORE / C-ECHO) for receiving images from imaging devices
  - Modality Worklist (MWL) server so devices can query patient and order information
  - Automatic extraction of PDFs, images, and structured reports from DICOM files
  - Smart thumbnail generation for multi-frame imaging sequences
  - TLS encryption support with optional mutual authentication
  - Automatic retry and submission tracking via local database

  Note: After installation the NoscAI team will configure the app remotely.
  Clinics do not need to touch any configuration.
releaseNotes: "Renamed to ClinicOS DICOM Integration."
