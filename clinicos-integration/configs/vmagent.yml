global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: dicom-connector
    static_configs:
      - targets: ["web:3080"]
    metrics_path: /metrics

  - job_name: blackbox-exporter
    static_configs:
      - targets: ["blackbox-exporter:9115"]
