version: "0.3.6"
tagline: Bidirectional appointment sync between Doctolib and ClinicOS
icon: https://assets.clinicos.de/images/clinicos-icon.svg
description: >-
  ClinicOS Doctolib Sync runs on your Umbrel device and keeps appointments
  in sync between Doctolib and your ClinicOS workspace — automatically,
  in both directions.

  Features:
  - Reads new and updated appointments from Doctolib and creates them in ClinicOS
  - Writes appointments created in ClinicOS back to Doctolib
  - Credentials managed securely in ClinicOS — no file editing required
  - Real-time status visible from the Umbrel dashboard

  Setup: Enable Doctolib integration in ClinicOS, copy the TWIN_TOKEN
  shown in the setup dialog, and paste it here. That's it — no other
  configuration required.
