version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: doctolib-twin_web_1
      APP_PORT: 3080
      PROXY_AUTH_ADD: "false"

  web:
    image: europe-west10-docker.pkg.dev/clinicos/clinicos-public/doctolib-twin:0.1.0
    restart: unless-stopped
    stop_grace_period: 30s
    expose:
      - "3080"
    volumes:
      - ${APP_DATA_DIR}/data:/app/data
      - ${APP_DATA_DIR}/session:/app/.session
    environment:
      CLINICOS_API_URL: "${APP_CLINICOS_API_URL}"
      TWIN_TOKEN: "${APP_TWIN_TOKEN}"
      DOCTOLIB_HEADLESS: "true"
      DOCTOLIB_OUTPUT_DIR: "/app/data"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
